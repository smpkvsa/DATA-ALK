# Fail Alur Kerja (Workflow) untuk Deploy React + Vite ke GitHub Pages
name: Deploy ke GitHub Pages

on:
  push:
    branches: ["main", "master"] # Jalankan setiap kali ada push ke branch main atau master
  workflow_dispatch: # Membolehkan trigger secara manual dari tab Actions di GitHub

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod sumber
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pasang dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Bina aplikasi (Build Vite)
        run: npm run build

      - name: Sediakan GitHub Pages
        uses: actions/configure-pages@v4

      - name: Muat naik hasil binaan (dist folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Folder output kompilasi Vite

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
